spring:
  application:
    name: generator

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://host.docker.internal:5432/booking
    username: postgres
    password: "postgres"

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/generator-changelog-master.xml
    default_schema: generator_schema
    liquibase-schema: liquibase_history
    database-change-log-table: databasechangelog_generator
    database-change-log-lock-table: databasechangeloglock_generator

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: generator
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: true
        spring.json.trusted.packages: "*"

server:
  port: 8080

services:
  registrator:
    url: http://registrator:8081