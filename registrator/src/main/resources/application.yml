spring:
  application:
    name: registrator
    generator:
      url: http://localhost:8080/generator/
    payment:
      url: http://localhost:8082/payment/
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/example
    username: admin
    password: "password"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

server:
  port: 8081
