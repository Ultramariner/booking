spring:
  application:
    name: registrator

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/booking
    username: admin
    password: "password"

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/registrator-changelog-master.xml
    default_schema: registrator_schema
    liquibase-schema: liquibase_history
    database-change-log-table: databasechangelog_registrator
    database-change-log-lock-table: databasechangeloglock_registrator

server:
  port: 8081

services:
  generator:
    url: http://localhost:8080/generator
  payment:
    url: http://localhost:8082/payment
